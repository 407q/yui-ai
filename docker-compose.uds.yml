services:
  postgres:
    image: postgres:16-alpine
    container_name: yui-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    command:
      - postgres
      - -c
      - unix_socket_directories=/var/run/postgresql
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ${POSTGRES_SOCKET_DIR:-/tmp/postgres-socket}:/var/run/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h /var/run/postgresql -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  agent:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    container_name: yui-ai-agent
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      BOT_MODE: ${BOT_MODE:-standard}
      AGENT_SOCKET_PATH: ${AGENT_SOCKET_PATH:-/tmp/sockets/agent-runtime.sock}
      STATE_STORE_DSN: ${STATE_STORE_DSN:?STATE_STORE_DSN is required}
      MEMORY_STORE_DSN: ${MEMORY_STORE_DSN:?MEMORY_STORE_DSN is required}
      AGENT_GATEWAY_API_SOCKET_PATH: ${AGENT_GATEWAY_API_SOCKET_PATH:-/tmp/sockets/gateway-api.sock}
      AGENT_MCP_TIMEOUT_SEC: ${AGENT_MCP_TIMEOUT_SEC:-30}
      AGENT_TO_GATEWAY_INTERNAL_TOKEN: ${AGENT_TO_GATEWAY_INTERNAL_TOKEN:-}
      GATEWAY_TO_AGENT_INTERNAL_TOKEN: ${GATEWAY_TO_AGENT_INTERNAL_TOKEN:-}
      COPILOT_GITHUB_TOKEN: ${COPILOT_GITHUB_TOKEN:-}
      COPILOT_MODEL: ${COPILOT_MODEL:-claude-sonnet-4.6}
      COPILOT_WORKING_DIRECTORY: ${COPILOT_WORKING_DIRECTORY:-/app}
      COPILOT_SEND_TIMEOUT_MS: ${COPILOT_SEND_TIMEOUT_MS:-180000}
      COPILOT_SDK_LOG_LEVEL: ${COPILOT_SDK_LOG_LEVEL:-info}
      INTERNAL_CONNECTION_MODE: uds
      DB_SOCKET_MOUNT_PATH: ${DB_SOCKET_MOUNT_PATH:-/tmp/postgres-socket}
    volumes:
      - agent_workspace_data:/agent/session
      - ${RUNTIME_SOCKET_DIR:-/tmp/sockets}:/tmp/sockets
      - ${POSTGRES_SOCKET_DIR:-/tmp/postgres-socket}:${DB_SOCKET_MOUNT_PATH:-/tmp/postgres-socket}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('node:http');const req=http.request({socketPath:process.env.AGENT_SOCKET_PATH||'/tmp/sockets/agent-runtime.sock',path:'/health',method:'GET'},(res)=>process.exit(res.statusCode>=200&&res.statusCode<300?0:1));req.on('error',()=>process.exit(1));req.end();",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  agent_workspace_data:
